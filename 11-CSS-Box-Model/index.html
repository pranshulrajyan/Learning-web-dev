<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        .box {
            width: 200px;
            box-sizing: border-box;
            height: 100px;
            background-color: lightblue;
            border: 5px solid black;
            margin: 10px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        This is a box with a border, margin, and padding.
    </div>
    <div>The CSS Box Model is the foundational layout system where every HTML element is treated as a rectangular box. The browser uses this model to calculate an element's total size and determine how it interacts with neighboring elements.</div>
    <img src="css-box-model.jpg" alt="CSS Box Model">
</body>
</html>
